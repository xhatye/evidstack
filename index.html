<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EVIDSTACK — Evidence-Based Supplementation</title>
    <meta name="description" content="Chaque supplément classé par efficacité et niveau d'évidence scientifique. Données PubMed et Cochrane." />
    <meta name="theme-color" content="#f4f2ee" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #060810; min-height: 100vh; }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700;1,900&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background:#f4f2ee;-webkit-font-smoothing:antialiased;font-family:'Montserrat',sans-serif;}
    input::placeholder{color:#6b7280;font-family:'Montserrat',sans-serif;}
    ::-webkit-scrollbar{width:4px;height:4px;}
    ::-webkit-scrollbar-track{background:#f4f2ee;}
    ::-webkit-scrollbar-thumb{background:#d4d0c8;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
    button{transition:opacity .15s;cursor:pointer;}
    button:hover{opacity:.8;}
  </style>
</head>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
